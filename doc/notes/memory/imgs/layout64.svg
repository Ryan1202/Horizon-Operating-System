<svg width="720" height="1100" viewBox="0 0 720 1100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .region { fill: #f5f7fa; stroke: black; stroke-width: 2; }
    .hole { fill: none; stroke: #999; stroke-width: 1.5; stroke-dasharray: 6,4; }

    .label { font-family: monospace; font-size: 16px; fill: #111; }
    .label-hole { font-family: monospace; font-size: 15px; fill: #888; }

    .addr { font-family: monospace; font-size: 13px; fill: #555; text-anchor: start; }
    .center { text-anchor: middle; }
  </style>

  <!-- Top Canonical Space -->
  <rect class="hole" x="50" y="10" width="400" height="30"/>
  <text class="label-hole center" x="250" y="27">Canonical Upper Gap</text>
  <text class="addr" x="470" y="15">0xffffffffffffffff</text>

  <text class="addr" x="470" y="45">0xffffffff_a0000000</text>

  <!-- Kernel Code (512MB) -->
  <rect class="region" x="50" y="40" width="400" height="20"/>
  <text class="label center" x="250" y="55">Kernel Code (512MB)</text>

  <text class="addr" x="470" y="65">0xffffffff_80000000</text>

  <!-- Hole3 (2TB级 → 最大) -->
  <rect class="hole" x="50" y="60" width="400" height="110"/>
  <text class="label-hole center" x="250" y="120">Hole 3</text>

  <text class="addr" x="470" y="175">0xfffffc00_00000000</text>

  <!-- vmemmap (4TB) -->
  <rect class="region" x="50" y="170" width="400" height="120"/>
  <text class="label center" x="250" y="235">vmemmap (4TB)</text>

  <text class="addr" x="470" y="295">0xfffff800_00000000</text>

  <!-- Hole2 (8TB) -->
  <rect class="hole" x="50" y="290" width="400" height="140"/>
  <text class="label-hole center" x="250" y="365">Hole 2</text>
  
  <text class="addr" x="470" y="435">0xfffff000_00000000</text>

  <!-- vmalloc (32TB) -->
  <rect class="region" x="50" y="430" width="400" height="160"/>
  <text class="label center" x="250" y="515">vmalloc (32TB)</text>
  
  <text class="addr" x="470" y="595">0xffffd000_00000000</text>

  <!-- Hole1 (8TB) -->
  <rect class="hole" x="50" y="590" width="400" height="140"/>
  <text class="label-hole center" x="250" y="665">Hole 1</text>
  
  <text class="addr" x="470" y="735">0xffffc800_00000000</text>

  <!-- Linear (64TB) -->
  <rect class="region" x="50" y="730" width="400" height="200"/>
  <text class="label center" x="250" y="835">Linear Mapping (64TB)</text>
  
  <text class="addr" x="470" y="935">0xffff8800_00000000</text>

  <!-- Hole0 (8TB) -->
  <rect class="hole" x="50" y="930" width="400" height="140"/>
  <text class="label-hole center" x="250" y="1005">Hole 0</text>
  <text class="addr" x="470" y="1075">0xffff8000_00000000</text>

</svg>