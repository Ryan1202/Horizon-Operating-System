arch = "x86"

[tools.macos]
cc = "x86_64-elf-gcc"
ld = "x86_64-elf-ld"

[tools]
cc = "gcc"
as = "nasm"
ld = "ld"
cflags = [
    "-march=i686",
    "-std=gnu11",
    "-nostdinc",
    "-nostdlib",
    "-m32",
    "-ffreestanding",
    "-fno-pie",
    "-fno-stack-protector",
    "-fno-strict-aliasing",
    "-fno-builtin",
    "-Wall",
    "-Wunused",
]
asflags = ["-f", "elf32"]
ldflags = ["-m", "elf_i386", "-nostdlib"]
rust_target = "src/arch/x86/i686-none.json"
rustflags = [
    "-C",
    "relocation-model=static",
    "--emit",
    "obj",
    "-C",
    "code-model=kernel",
    "-C",
    "symbol-mangling-version=v0",
    "-C",
    "force-frame-pointers=yes",
    "-Cllvm-args=--inline-threshold=0",
]

[debug]
level = "all"
cflags = ["-O0", "-g"]
asflags = ["-g"]
